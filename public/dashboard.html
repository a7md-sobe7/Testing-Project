<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Dashboard</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 250px;
            background-color: #333;
            color: white;
            padding: 1rem;
        }

        .sidebar h2 {
            text-align: center;
        }

        .nav-item {
            padding: 10px;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 5px;
        }

        .nav-item:hover,
        .nav-item.active {
            background-color: #555;
        }

        .content {
            flex: 1;
            padding: 2rem;
            background-color: #f4f6f8;
            overflow-y: auto;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-top: 1rem;
        }

        th,
        td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f8f9fa;
        }

        .btn {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
        }

        .btn-primary {
            background-color: #007bff;
            color: white;
        }

        .btn-danger {
            background-color: #dc3545;
            color: white;
        }

        .form-inline {
            margin-bottom: 1rem;
            display: flex;
            gap: 10px;
        }

        input,
        select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>Admin Panel</h2>
        <div class="nav-item active" onclick="showView('rooms')">Room Management</div>
        <div class="nav-item" onclick="showView('search')">Guest Search</div>
        <div class="nav-item" onclick="logout()" style="margin-top: auto; background-color: #c0392b;">Logout</div>
    </div>

    <div class="content">
        <!-- Room Management View -->
        <div id="rooms-view" class="view active">
            <h1>Room Management</h1>
            <div class="form-inline">
                <input type="number" id="room-number" placeholder="Room No">
                <select id="room-type">
                    <option value="Single">Single</option>
                    <option value="Double">Double</option>
                    <option value="Suite">Suite</option>
                </select>
                <input type="number" id="room-price" placeholder="Price">
                <select id="room-status">
                    <option value="Available">Available</option>
                    <option value="Occupied">Occupied</option>
                    <option value="Maintenance">Maintenance</option>
                </select>
                <button class="btn btn-primary" onclick="addRoom()">Add Room</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Room No</th>
                        <th>Type</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="rooms-table-body">
                    <!-- Rooms loaded here -->
                </tbody>
            </table>
        </div>

        <!-- Search View -->
        <div id="search-view" class="view">
            <h1>Guest Search</h1>
            <div class="form-inline">
                <input type="text" id="search-query" placeholder="Search Guest Name...">
                <button class="btn btn-primary" onclick="searchGuests()">Search</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Booking ID</th>
                        <th>Guest Name</th>
                        <th>Room Number</th>
                        <th>Check-In Date</th>
                    </tr>
                </thead>
                <tbody id="guests-table-body">
                    <!-- Results loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Check Auth
        if (!localStorage.getItem('token')) {
            window.location.href = '/index.html';
        }

        // Navigation
        function showView(viewName) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(viewName + '-view').classList.add('active');
            // Highlight nav item logic omitted for brevity

            if (viewName === 'rooms') loadRooms();
            if (viewName === 'search') searchGuests();
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/index.html';
        }

        // --- Room Management ---
        async function loadRooms() {
            const res = await fetch('/api/rooms');
            const rooms = await res.json();
            const tbody = document.getElementById('rooms-table-body');
            tbody.innerHTML = '';
            rooms.forEach(room => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${room.id}</td>
                    <td>${room.type}</td>
                    <td>$${room.price}</td>
                    <td>${room.status}</td>
                    <td>
                        <button class="btn btn-danger" onclick="deleteRoom(${room.id})">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function addRoom() {
            const number = document.getElementById('room-number').value;
            const type = document.getElementById('room-type').value;
            const price = document.getElementById('room-price').value;
            const status = document.getElementById('room-status').value;

            if (!number || !price) return alert('Please fill all fields');

            await fetch('/api/rooms', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ number, type, price, status })
            });

            document.getElementById('room-number').value = '';
            document.getElementById('room-price').value = '';
            loadRooms();
        }

        async function deleteRoom(id) {
            if (confirm('Are you sure?')) {
                await fetch('/api/rooms/' + id, { method: 'DELETE' });
                loadRooms();
            }
        }

        // --- Guest Search ---
        async function searchGuests() {
            const query = document.getElementById('search-query').value;
            const res = await fetch('/api/guests?query=' + encodeURIComponent(query));
            const guests = await res.json();
            const tbody = document.getElementById('guests-table-body');
            tbody.innerHTML = '';
            guests.forEach(guest => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${guest.id}</td>
                    <td>${guest.guestName}</td>
                    <td>${guest.roomNumber}</td>
                    <td>${guest.checkIn}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Initial Load
        loadRooms();
    </script>
</body>

</html>
